version: 2.1

orbs:
  node: circleci/node@5.1.0

workflows:
  release:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - publish-updater:
          requires:
            - build-windows
            - build-linux
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    environment:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - checkout
      - run:
          name: Install Node.js
          shell: powershell.exe
          command: |
            choco install nodejs --version=20.18.0 -y
            $env:PATH = "C:\Program Files\nodejs;" + $env:PATH
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            rustup target add x86_64-pc-windows-msvc
      - run:
          name: Install frontend dependencies
          shell: powershell.exe
          command: npm install
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            npm run tauri build -- --bundles nsis
      - run:
          name: Upload to GitHub Release
          shell: powershell.exe
          command: |
            #!powershell.exe
            $ErrorActionPreference = "Stop"
            $owner = "Drodo44"
            $repo = "Drodo.io"
            $tag = $env:CIRCLE_TAG
            $token = $env:GITHUB_TOKEN

            # Find the installer file
            $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installer) {
              $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if (-not $installer) {
              Write-Error "No installer found"
              exit 1
            }
            $assetName = $installer.Name
            $assetPath = $installer.FullName
            Write-Host "Uploading: $assetName from $assetPath"

            # Create or get the GitHub release
            $headers = @{
              Authorization = "token $token"
              Accept = "application/vnd.github+json"
            }

            $existingRelease = $null
            try {
              $existingRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers -Method Get
            } catch {}

            if ($existingRelease) {
              $releaseId = $existingRelease.id
              Write-Host "Using existing release id: $releaseId"
            } else {
              $body = @{ tag_name = $tag; name = $tag; draft = $false; prerelease = $false } | ConvertTo-Json
              $newRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases" -Headers $headers -Method Post -Body $body -ContentType "application/json"
              $releaseId = $newRelease.id
              Write-Host "Created release id: $releaseId"
            }

            # Build upload URL directly from release ID — do NOT use upload_url from API response
            $uploadUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$releaseId/assets?name=$assetName"
            Write-Host "Upload URL: $uploadUrl"

            $uploadHeaders = @{
              Authorization = "token $token"
              Accept = "application/vnd.github+json"
              "Content-Type" = "application/octet-stream"
            }

            Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $uploadHeaders -InFile $assetPath
            Write-Host "Upload complete."

            # Upload NSIS .sig file for updater manifest
            $sigFiles = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.sig" -ErrorAction SilentlyContinue
            foreach ($sig in $sigFiles) {
              $sigUploadUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$releaseId/assets?name=$($sig.Name)"
              Invoke-RestMethod -Uri $sigUploadUrl -Method Post -Headers $uploadHeaders -InFile $sig.FullName
              Write-Host "Uploaded sig: $($sig.Name)"
            }

  build-linux:
    machine:
      image: ubuntu-2204:current
    environment:
      DEBIAN_FRONTEND: noninteractive
      NODE_OPTIONS: --max-old-space-size=8192
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            DEBIAN_FRONTEND=noninteractive sudo apt-get update
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libgtk-3-dev \
              libssl-dev \
              pkg-config \
              curl \
              wget \
              file \
              libxdo-dev \
              libglib2.0-dev
      - node/install:
          node-version: '20'
      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          command: |
            source $HOME/.cargo/env
            npm run tauri build -- --bundles appimage,deb
      - run:
          name: Upload to GitHub Release
          command: |
            TAG=$CIRCLE_TAG
            TOKEN=$GITHUB_TOKEN
            OWNER="Drodo44"
            REPO="Drodo.io"
            RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
            RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)

            if [ "$RELEASE_STATUS" = "404" ]; then
              CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
                "https://api.github.com/repos/$OWNER/$REPO/releases")
              RELEASE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
              RELEASE_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
              if [ "$RELEASE_STATUS" = "422" ]; then
                RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
                RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
                RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)
              fi
            fi

            if [ "$RELEASE_STATUS" != "200" ] && [ "$RELEASE_STATUS" != "201" ]; then
              echo "$RELEASE_BODY"
              exit 1
            fi

            UPLOAD_URL=$(echo "$RELEASE_BODY" | python3 -c "import sys,json,re; print(re.sub(r'\{[^}]*\}', '', json.load(sys.stdin)['upload_url']))")

            APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
            if [ -n "$APPIMAGE" ]; then
              FILENAME=$(basename $APPIMAGE)
              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$APPIMAGE" \
                "$UPLOAD_URL?name=$FILENAME"
            fi

            # Upload AppImage .sig file for updater manifest
            SIG_FILE=$(find src-tauri/target/release/bundle/appimage -name "*.sig" | head -1)
            if [ -n "$SIG_FILE" ]; then
              SIG_FILENAME=$(basename "$SIG_FILE")
              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$SIG_FILE" \
                "$UPLOAD_URL?name=$SIG_FILENAME"
              echo "Uploaded sig: $SIG_FILENAME"
            fi

  publish-updater:
    machine:
      image: ubuntu-2204:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Generate and upload latest.json
          command: |
            python3 - <<'PYEOF'
            import json, urllib.request, urllib.error, os, sys
            from datetime import datetime, timezone

            TOKEN   = os.environ['GITHUB_TOKEN']
            TAG     = os.environ['CIRCLE_TAG']
            OWNER   = 'Drodo44'
            REPO    = 'Drodo.io'

            with open('src-tauri/tauri.conf.json') as f:
                VERSION = json.load(f)['version']

            def gh(path, method='GET', data=None, content_type='application/json', accept='application/vnd.github+json'):
                req = urllib.request.Request(
                    f'https://api.github.com{path}',
                    method=method, data=data,
                    headers={'Authorization': f'Bearer {TOKEN}', 'Accept': accept,
                             'Content-Type': content_type})
                with urllib.request.urlopen(req) as r:
                    return json.load(r)

            release    = gh(f'/repos/{OWNER}/{REPO}/releases/tags/{TAG}')
            release_id = release['id']
            assets     = {a['name']: a for a in release['assets']}

            def download_sig(name):
                if name not in assets:
                    print(f'ERROR: {name} not found in release assets', file=sys.stderr)
                    sys.exit(1)
                asset_id = assets[name]['id']
                req = urllib.request.Request(
                    f'https://api.github.com/repos/{OWNER}/{REPO}/releases/assets/{asset_id}',
                    headers={'Authorization': f'Bearer {TOKEN}', 'Accept': 'application/octet-stream'})
                with urllib.request.urlopen(req) as r:
                    return r.read().decode('utf-8').strip()

            win_sig   = download_sig(f'Drodo_{VERSION}_x64-setup.exe.sig')
            linux_sig = download_sig(f'Drodo_{VERSION}_amd64.AppImage.sig')

            manifest = {
                'version':  VERSION,
                'notes':    'Bug fixes and improvements',
                'pub_date': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
                'platforms': {
                    'windows-x86_64': {
                        'signature': win_sig,
                        'url': f'https://github.com/{OWNER}/{REPO}/releases/download/{TAG}/Drodo_{VERSION}_x64-setup.exe',
                    },
                    'linux-x86_64': {
                        'signature': linux_sig,
                        'url': f'https://github.com/{OWNER}/{REPO}/releases/download/{TAG}/Drodo_{VERSION}_amd64.AppImage',
                    },
                },
            }
            body = json.dumps(manifest, indent=2).encode('utf-8')
            print(body.decode())

            upload_url = (f'https://uploads.github.com/repos/{OWNER}/{REPO}'
                          f'/releases/{release_id}/assets?name=latest.json')
            req = urllib.request.Request(upload_url, method='POST', data=body,
                headers={'Authorization': f'Bearer {TOKEN}',
                         'Accept': 'application/vnd.github+json',
                         'Content-Type': 'application/json'})
            try:
                with urllib.request.urlopen(req) as r:
                    result = json.load(r)
                    print(f"Uploaded: {result['browser_download_url']}")
            except urllib.error.HTTPError as e:
                print(f'Upload failed: {e.code} {e.read().decode()}', file=sys.stderr)
                sys.exit(1)
            PYEOF
