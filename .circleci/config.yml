version: 2.1

orbs:
  node: circleci/node@5.1.0

workflows:
  release:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    steps:
      - checkout
      - run:
          name: Install Node.js
          shell: powershell.exe
          command: |
            choco install nodejs --version=20.18.0 -y
            $env:PATH = "C:\Program Files\nodejs;" + $env:PATH
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            rustup target add x86_64-pc-windows-msvc
      - run:
          name: Install frontend dependencies
          shell: powershell.exe
          command: npm install
      - run:
          name: Build Tauri app
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            npm run tauri build -- --bundles nsis
      - run:
          name: Upload to GitHub Release
          shell: powershell.exe
          command: |
            $tag = $env:CIRCLE_TAG
            $token = $env:GITHUB_TOKEN
            $owner = "Drodo44"
            $repo = "Drodo.io"
            $headers = @{
              Authorization = "Bearer $token"
              Accept = "application/vnd.github+json"
            }
            try {
              $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers
            } catch {
              try {
                $body = @{
                  tag_name = $tag
                  name = $tag
                  draft = $false
                  prerelease = $false
                } | ConvertTo-Json
                $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases" -Method Post -Headers $headers -Body $body -ContentType "application/json"
              } catch {
                $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers
              }
            }
            $uploadUrl = ($release.upload_url -replace '\{\?name,label\}$', '')
            $exePath = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
            if ($exePath) {
              $assetUploadUrl = "$uploadUrl?name=$($exePath.Name)"
              Invoke-RestMethod -Uri $assetUploadUrl -Method Post -Headers @{Authorization = "Bearer $token"; Accept = "application/vnd.github+json"; "Content-Type" = "application/octet-stream"} -InFile $exePath.FullName
            }

  build-linux:
    machine:
      image: ubuntu-2204:current
    environment:
      DEBIAN_FRONTEND: noninteractive
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            DEBIAN_FRONTEND=noninteractive sudo apt-get update
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libgtk-3-dev \
              libssl-dev \
              pkg-config \
              curl \
              wget \
              file \
              libxdo-dev \
              libglib2.0-dev
      - node/install:
          node-version: '20'
      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build Tauri app
          command: |
            source $HOME/.cargo/env
            npm run tauri build -- --bundles appimage,deb
      - run:
          name: Upload to GitHub Release
          command: |
            TAG=$CIRCLE_TAG
            TOKEN=$GITHUB_TOKEN
            OWNER="Drodo44"
            REPO="Drodo.io"
            RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
            RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)

            if [ "$RELEASE_STATUS" = "404" ]; then
              CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
                "https://api.github.com/repos/$OWNER/$REPO/releases")
              RELEASE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
              RELEASE_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
              if [ "$RELEASE_STATUS" = "422" ]; then
                RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
                RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
                RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)
              fi
            fi

            if [ "$RELEASE_STATUS" != "200" ] && [ "$RELEASE_STATUS" != "201" ]; then
              echo "$RELEASE_BODY"
              exit 1
            fi

            UPLOAD_URL=$(echo "$RELEASE_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['upload_url'].split('{')[0])")

            APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
            if [ -n "$APPIMAGE" ]; then
              FILENAME=$(basename $APPIMAGE)
              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$APPIMAGE" \
                "$UPLOAD_URL?name=$FILENAME"
            fi
