version: 2.1

orbs:
  node: circleci/node@5.1.0

workflows:
  release:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - publish-updater:
          requires:
            - build-windows
            - build-linux
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    environment:
      NODE_OPTIONS: --max-old-space-size=8192
      TAURI_SIGNING_PRIVATE_KEY: $TAURI_SIGNING_PRIVATE_KEY
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: $TAURI_SIGNING_PRIVATE_KEY_PASSWORD
    steps:
      - checkout
      - run:
          name: Install Node.js
          shell: powershell.exe
          command: |
            choco install nodejs --version=20.18.0 -y
            $env:PATH = "C:\Program Files\nodejs;" + $env:PATH
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            rustup target add x86_64-pc-windows-msvc
      - run:
          name: Install frontend dependencies
          shell: powershell.exe
          command: npm install
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            $env:TAURI_SIGNING_PRIVATE_KEY = [System.Environment]::GetEnvironmentVariable("TAURI_SIGNING_PRIVATE_KEY", "Machine")
            if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
              $env:TAURI_SIGNING_PRIVATE_KEY = [System.Environment]::GetEnvironmentVariable("TAURI_SIGNING_PRIVATE_KEY", "User")
            }
            npm run tauri build -- --bundles nsis
      - run:
          name: Debug - List bundle output
          shell: powershell.exe
          command: |
            Write-Host "=== src-tauri/target/release/bundle/ ==="
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize
      - run:
          name: Upload to GitHub Release
          shell: powershell.exe
          command: |
            #!powershell.exe
            $ErrorActionPreference = "Stop"
            $owner = "Drodo44"
            $repo = "Drodo.io"
            $tag = $env:CIRCLE_TAG
            $token = $env:GITHUB_TOKEN

            # Find the installer file
            $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installer) {
              $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if (-not $installer) {
              Write-Error "No installer found"
              exit 1
            }
            $assetName = $installer.Name
            $assetPath = $installer.FullName
            Write-Host "Uploading: $assetName from $assetPath"

            # Create or get the GitHub release
            $headers = @{
              Authorization = "token $token"
              Accept = "application/vnd.github+json"
            }

            $existingRelease = $null
            try {
              $existingRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers -Method Get
            } catch {}

            if ($existingRelease) {
              $releaseId = $existingRelease.id
              Write-Host "Using existing release id: $releaseId"
            } else {
              $body = @{ tag_name = $tag; name = $tag; draft = $false; prerelease = $false } | ConvertTo-Json
              $newRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases" -Headers $headers -Method Post -Body $body -ContentType "application/json"
              $releaseId = $newRelease.id
              Write-Host "Created release id: $releaseId"
            }

            # Build upload URL directly from release ID — do NOT use upload_url from API response
            $uploadUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$releaseId/assets?name=$assetName"
            Write-Host "Upload URL: $uploadUrl"

            $uploadHeaders = @{
              Authorization = "token $token"
              Accept = "application/vnd.github+json"
              "Content-Type" = "application/octet-stream"
            }

            # Delete existing asset if it exists
            $existingAssets = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/$releaseId/assets" -Headers $headers
            foreach ($existing in $existingAssets) {
              if ($existing.name -eq $assetName) {
                Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/assets/$($existing.id)" -Headers $headers -Method Delete
                Write-Host "Deleted existing asset: $($existing.name)"
              }
            }

            Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $uploadHeaders -InFile $assetPath
            Write-Host "Upload complete."

            # Upload NSIS .sig file for updater manifest (search recursively under bundle/)
            $sigFiles = Get-ChildItem -Path "src-tauri/target/release/bundle" -Filter "*.sig" -Recurse -ErrorAction SilentlyContinue
            if (-not $sigFiles) {
              Write-Error "FATAL: No .sig files found. TAURI_SIGNING_PRIVATE_KEY may not be set or signing failed."
              exit 1
            }
            foreach ($sig in $sigFiles) {
              $sigUploadUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$releaseId/assets?name=$($sig.Name)"
              $result = Invoke-RestMethod -Uri $sigUploadUrl -Method Post -Headers $uploadHeaders -InFile $sig.FullName
              Write-Host "Uploaded sig: $($sig.Name) -> $($result.browser_download_url)"
            }

  build-linux:
    machine:
      image: ubuntu-2204:current
    environment:
      DEBIAN_FRONTEND: noninteractive
      NODE_OPTIONS: --max-old-space-size=8192
      TAURI_SIGNING_PRIVATE_KEY: $TAURI_SIGNING_PRIVATE_KEY
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: $TAURI_SIGNING_PRIVATE_KEY_PASSWORD
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install system dependencies
          command: |
            DEBIAN_FRONTEND=noninteractive sudo apt-get update
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libgtk-3-dev \
              libssl-dev \
              pkg-config \
              curl \
              wget \
              file \
              libxdo-dev \
              libglib2.0-dev
      - node/install:
          node-version: '20'
      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          command: |
            source $HOME/.cargo/env
            export TAURI_SIGNING_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY}"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}"
            npm run tauri build -- --bundles appimage,deb
      - run:
          name: Upload to GitHub Release
          command: |
            TAG=$CIRCLE_TAG
            TOKEN=$GITHUB_TOKEN
            OWNER="Drodo44"
            REPO="Drodo.io"
            RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
            RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)

            if [ "$RELEASE_STATUS" = "404" ]; then
              CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
                "https://api.github.com/repos/$OWNER/$REPO/releases")
              RELEASE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
              RELEASE_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
              if [ "$RELEASE_STATUS" = "422" ]; then
                RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
                RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
                RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)
              fi
            fi

            if [ "$RELEASE_STATUS" != "200" ] && [ "$RELEASE_STATUS" != "201" ]; then
              echo "$RELEASE_BODY"
              exit 1
            fi

            UPLOAD_URL=$(echo "$RELEASE_BODY" | python3 -c "import sys,json,re; print(re.sub(r'\{[^}]*\}', '', json.load(sys.stdin)['upload_url']))")
            RELEASE_ID=$(echo "$RELEASE_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

            APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
            if [ -n "$APPIMAGE" ]; then
              FILENAME=$(basename $APPIMAGE)
              # Delete existing asset with same name if present
              EXISTING_ASSETS=$(curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$OWNER/$REPO/releases/$RELEASE_ID/assets")
              EXISTING_ID=$(echo "$EXISTING_ASSETS" | python3 -c "import sys,json; assets=json.load(sys.stdin); match=[a['id'] for a in assets if a['name']==('$(basename $APPIMAGE)' if '$APPIMAGE' else '')]; print(match[0] if match else '')" 2>/dev/null || echo "")
              if [ -n "$EXISTING_ID" ]; then
                curl -s -X DELETE -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$OWNER/$REPO/releases/assets/$EXISTING_ID"
                echo "Deleted existing asset"
              fi
              curl -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$APPIMAGE" \
                "$UPLOAD_URL?name=$FILENAME"
            fi

            SIG_FILE=$(find src-tauri/target/release/bundle/appimage -name "*.sig" | head -1)
            if [ -z "$SIG_FILE" ]; then
              echo "FATAL: No .sig file found. TAURI_SIGNING_PRIVATE_KEY may not be set or signing failed."
              exit 1
            fi
            SIG_FILENAME=$(basename "$SIG_FILE")
            curl -f -s -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$SIG_FILE" \
              "$UPLOAD_URL?name=$SIG_FILENAME"
            echo "Uploaded sig: $SIG_FILENAME"

  publish-updater:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Generate and upload latest.json
          command: python3 scripts/publish_updater.py
