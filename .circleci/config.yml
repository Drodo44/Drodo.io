version: 2.1

orbs:
  node: circleci/node@5.1.0

workflows:
  release:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-linux:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - publish-updater:
          requires:
            - build-windows
            - build-linux
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    environment:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - checkout
      - run:
          name: Verify release version matches tag
          shell: powershell.exe
          command: node scripts/release-version.mjs verify
      - run:
          name: Install Node.js
          shell: powershell.exe
          command: |
            choco install nodejs --version=20.18.0 -y
            $env:PATH = "C:\Program Files\nodejs;" + $env:PATH
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            rustup target add x86_64-pc-windows-msvc
      - run:
          name: Install frontend dependencies
          shell: powershell.exe
          command: npm install
      - run:
          name: Build Windows runtime artifact
          no_output_timeout: 90m
          shell: powershell.exe
          command: node scripts/prepare-windows-automation-runtime.mjs
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;" + $env:PATH
            if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
              Write-Error "TAURI_SIGNING_PRIVATE_KEY is not set for this job."
              exit 1
            }
            if ($env:TAURI_SIGNING_PRIVATE_KEY.Contains('\n')) {
              $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY -replace '\\n', "`n"
            }
            if (-not $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
              $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = "Drodo4492!"
            }
            npm run tauri build -- --bundles nsis
      - run:
          name: Debug - List bundle output
          shell: powershell.exe
          command: |
            Write-Host "=== src-tauri/target/release/bundle/ ==="
            Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize
      - run:
          name: Upload to GitHub Release
          shell: powershell.exe
          command: |
            #!powershell.exe
            $ErrorActionPreference = "Stop"
            $owner = "Drodo44"
            $repo = "Drodo.io"
            $tag = $env:CIRCLE_TAG
            $token = $env:GITHUB_TOKEN

            function Remove-ExistingAsset {
              param(
                [Parameter(Mandatory = $true)]
                [string]$Name
              )

              $existingAssets = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/$releaseId/assets" -Headers $headers
              foreach ($existing in $existingAssets) {
                if ($existing.name -eq $Name) {
                  Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/assets/$($existing.id)" -Headers $headers -Method Delete
                  Write-Host "Deleted existing asset: $($existing.name)"
                }
              }
            }

            function Upload-Asset {
              param(
                [Parameter(Mandatory = $true)]
                [string]$Path
              )

              $name = Split-Path -Leaf $Path
              Remove-ExistingAsset -Name $name
              $uploadAssetUrl = "https://uploads.github.com/repos/$owner/$repo/releases/$releaseId/assets?name=$name"
              Write-Host "Uploading asset: $name"
              & curl.exe -sSfL `
                -X POST `
                -H "Authorization: token $token" `
                -H "Accept: application/vnd.github+json" `
                -H "Content-Type: application/octet-stream" `
                --data-binary "@$Path" `
                "$uploadAssetUrl" | Out-Null
            }

            $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $installer) {
              $installer = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if (-not $installer) {
              Write-Error "No installer found"
              exit 1
            }
            $assetName = $installer.Name
            $assetPath = $installer.FullName
            Write-Host "Preparing uploads for: $assetName from $assetPath"

            # Create or get the GitHub release
            $headers = @{
              Authorization = "token $token"
              Accept = "application/vnd.github+json"
            }

            $existingRelease = $null
            try {
              $existingRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" -Headers $headers -Method Get
            } catch {}

            if ($existingRelease) {
              $releaseId = $existingRelease.id
              Write-Host "Using existing release id: $releaseId"
            } else {
              $body = @{ tag_name = $tag; name = $tag; draft = $false; prerelease = $false } | ConvertTo-Json
              $newRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases" -Headers $headers -Method Post -Body $body -ContentType "application/json"
              $releaseId = $newRelease.id
              Write-Host "Created release id: $releaseId"
            }

            $runtimeAssets = Get-ChildItem -Path "artifacts/runtime" -File -ErrorAction SilentlyContinue
            if (-not $runtimeAssets) {
              Write-Error "No runtime assets found under artifacts/runtime"
              exit 1
            }
            foreach ($runtimeAsset in $runtimeAssets) {
              Upload-Asset -Path $runtimeAsset.FullName
            }

            Upload-Asset -Path $assetPath
            Write-Host "Uploaded installer and runtime assets."

            # Upload NSIS .sig file for updater manifest (search recursively under bundle/)
            $sigFiles = Get-ChildItem -Path "src-tauri/target/release/bundle" -Filter "*.sig" -Recurse -ErrorAction SilentlyContinue
            if (-not $sigFiles) {
              Write-Error "FATAL: No .sig files found. TAURI_SIGNING_PRIVATE_KEY may not be set or signing failed."
              exit 1
            }
            foreach ($sig in $sigFiles) {
              Upload-Asset -Path $sig.FullName
              Write-Host "Uploaded sig: $($sig.Name)"
            }

  build-linux:
    machine:
      image: ubuntu-2204:current
    environment:
      DEBIAN_FRONTEND: noninteractive
      NODE_OPTIONS: --max-old-space-size=8192
    resource_class: large
    steps:
      - checkout
      - run:
          name: Verify release version matches tag
          command: node scripts/release-version.mjs verify
      - run:
          name: Install system dependencies
          command: |
            DEBIAN_FRONTEND=noninteractive sudo apt-get update
            DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              libgtk-3-dev \
              libssl-dev \
              pkg-config \
              curl \
              wget \
              file \
              libxdo-dev \
              libglib2.0-dev \
              git \
              xz-utils \
              build-essential \
              python3
      - node/install:
          node-version: '20'
      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build Linux runtime artifact
          no_output_timeout: 90m
          command: node scripts/prepare-linux-automation-runtime.mjs
      - run:
          name: Build Tauri app
          no_output_timeout: 60m
          command: |
            source $HOME/.cargo/env
            if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
              echo "TAURI_SIGNING_PRIVATE_KEY is not set for this job."
              exit 1
            fi
            if printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | grep -q '\\n'; then
              export TAURI_SIGNING_PRIVATE_KEY=$(printf '%b' "${TAURI_SIGNING_PRIVATE_KEY//\\n/\\n}")
            fi
            if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
              export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="Drodo4492!"
            fi
            npm run tauri build -- --bundles appimage,deb
      - run:
          name: Upload to GitHub Release
          command: |
            TAG=$CIRCLE_TAG
            TOKEN=$GITHUB_TOKEN
            OWNER="Drodo44"
            REPO="Drodo.io"
            RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
            RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
            RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)

            if [ "$RELEASE_STATUS" = "404" ]; then
              CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"draft\":false,\"prerelease\":false}" \
                "https://api.github.com/repos/$OWNER/$REPO/releases")
              RELEASE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
              RELEASE_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
              if [ "$RELEASE_STATUS" = "422" ]; then
                RELEASE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/$OWNER/$REPO/releases/tags/$TAG")
                RELEASE_BODY=$(echo "$RELEASE_RESPONSE" | sed '$d')
                RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n1)
              fi
            fi

            if [ "$RELEASE_STATUS" != "200" ] && [ "$RELEASE_STATUS" != "201" ]; then
              echo "$RELEASE_BODY"
              exit 1
            fi

            UPLOAD_URL=$(echo "$RELEASE_BODY" | python3 -c "import sys,json,re; print(re.sub(r'\{[^}]*\}', '', json.load(sys.stdin)['upload_url']))")
            RELEASE_ID=$(echo "$RELEASE_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

            upload_asset() {
              local asset_path="$1"
              local filename
              filename=$(basename "$asset_path")
              EXISTING_ASSETS=$(curl -s -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$OWNER/$REPO/releases/$RELEASE_ID/assets")
              EXISTING_ID=$(echo "$EXISTING_ASSETS" | python3 -c "
import json,sys
try:
    data=json.load(sys.stdin)
    assets=data if isinstance(data,list) else data.get('assets',data.get('items',[]))
    name='$filename'
    match=[str(a['id']) for a in assets if isinstance(a,dict) and a.get('name')==name]
    print(match[0] if match else '')
except Exception:
    print('')
")
              if [ -n "$EXISTING_ID" ]; then
                curl -s -X DELETE -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$OWNER/$REPO/releases/assets/$EXISTING_ID" >/dev/null
                echo "Deleted existing asset: $filename"
              fi
              curl -f -s -X POST \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/octet-stream" \
                --data-binary @"$asset_path" \
                "$UPLOAD_URL?name=$filename" >/dev/null
              echo "Uploaded asset: $filename"
            }

            if [ ! -d "artifacts/runtime" ]; then
              echo "Runtime artifact directory artifacts/runtime is missing."
              exit 1
            fi

            for runtime_asset in artifacts/runtime/*; do
              if [ -f "$runtime_asset" ]; then
                upload_asset "$runtime_asset"
              fi
            done

            APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
            if [ -n "$APPIMAGE" ]; then
              upload_asset "$APPIMAGE"
            fi

            SIG_FILE=$(find src-tauri/target/release/bundle/appimage -name "*.sig" | head -1)
            if [ -z "$SIG_FILE" ]; then
              echo "FATAL: No .sig file found. TAURI_SIGNING_PRIVATE_KEY may not be set or signing failed."
              exit 1
            fi
            SIG_FILENAME=$(basename "$SIG_FILE")
            upload_asset "$SIG_FILE"

  publish-updater:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Generate and upload latest.json
          command: python3 scripts/publish_updater.py
